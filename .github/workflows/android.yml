name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Generate Gradle Wrapper if missing
      run: |
        if [ ! -f "gradlew" ]; then
          npm install -g gradle
          gradle wrapper
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # ایجاد یک فایل ستینگ خالی برای ست‌آپ محیط در صورت نیاز
    - name: Create stub env files
      run: |
        touch .env
        touch .env.example

    # اجرای بیلد بدون دمون و با نادیده گرفتن تسک‌های تست فریمورک‌ها
    - name: Build with Gradle
      run: ./gradlew assembleDebug -x test -x testDebugUnitTest --no-daemon --stacktrace
      env:
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
