name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # ترفند طلایی: گیت‌هاب خودش فایل‌های گریدل خراب را با نسخه‌های اصلاح‌شده بازنویسی می‌کند
    - name: Override build files with fixed working versions
      run: |
        cat << 'EOF' > build.gradle.kts
        plugins {
            alias(libs.plugins.android.application) apply false
            alias(libs.plugins.kotlin.compose) apply false
            alias(libs.plugins.google.devtools.ksp) apply false
            alias(libs.plugins.secrets) apply false
        }
        EOF

        cat << 'EOF' > app/build.gradle.kts
        plugins {
            alias(libs.plugins.android.application)
            alias(libs.plugins.kotlin.compose)
            alias(libs.plugins.google.devtools.ksp)
            alias(libs.plugins.secrets)
        }
        android {
            namespace = "com.example"
            compileSdk = 35
            defaultConfig {
                applicationId = "com.aistudio.tlefinder.qzxpvw"
                minSdk = 24
                targetSdk = 35
                versionCode = 8
                versionName = "2.7"
                testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner"
            }
            buildTypes {
                release {
                    isCrunchPngs = false
                    isMinifyEnabled = false
                    proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")
                }
            }
            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_17
                targetCompatibility = JavaVersion.VERSION_17
            }
            buildFeatures {
                compose = true
                buildConfig = true
            }
        }
        secrets {
            propertiesFileName = ".env"
            defaultPropertiesFileName = ".env.example"
        }
        dependencies {
            implementation(platform(libs.androidx.compose.bom))
            implementation(platform(libs.firebase.bom))
            implementation(libs.androidx.activity.compose)
            implementation(libs.androidx.compose.material.icons.core)
            implementation(libs.androidx.compose.material.icons.extended)
            implementation(libs.androidx.compose.material3)
            implementation(libs.androidx.compose.ui)
            implementation(libs.androidx.compose.ui.graphics)
            implementation(libs.androidx.compose.ui.tooling.preview)
            implementation(libs.androidx.core.ktx)
            implementation(libs.androidx.lifecycle.runtime.compose)
            implementation(libs.androidx.lifecycle.runtime.ktx)
            implementation(libs.androidx.lifecycle.viewmodel.compose)
            implementation(libs.androidx.room.ktx)
            implementation(libs.androidx.room.runtime)
            implementation(libs.converter.moshi)
            implementation(libs.kotlinx.coroutines.android)
            implementation(libs.kotlinx.coroutines.core)
            implementation(libs.logging.interceptor)
            implementation(libs.moshi.kotlin)
            implementation(libs.okhttp)
            implementation(libs.retrofit)
            debugImplementation(libs.androidx.compose.ui.test.manifest)
            debugImplementation(libs.androidx.compose.ui.tooling)
            "ksp"(libs.androidx.room.compiler)
            "ksp"(libs.moshi.kotlin.codegen)
        }
        EOF

    - name: Generate Gradle Wrapper if missing
      run: |
        if [ ! -f "gradlew" ]; then
          npm install -g gradle
          gradle wrapper
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Create stub env files
      run: |
        touch .env
        touch .env.example

    - name: Build with Gradle
      run: ./gradlew assembleDebug -x test -x testDebugUnitTest --no-daemon --stacktrace
      env:
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
