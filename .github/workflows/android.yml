name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: "9.5.1"

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 9.5.1

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Fix compileSdk and targetSdk to 36
      run: |
        sed -i 's/compileSdk = 35/compileSdk = 36/g' app/build.gradle.kts
        sed -i 's/targetSdk = 35/targetSdk = 36/g' app/build.gradle.kts

    - name: Generate debug keystore
      run: |
        keytool -genkeypair \
          -keystore debug.keystore \
          -alias androiddebugkey \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass android \
          -keypass android \
          -dname "CN=Android Debug,O=Android,C=US"

    - name: Create .env files
      run: |
        API_KEY="${{ secrets.GEMINI_API_KEY }}"
        if [ -z "$API_KEY" ]; then
          API_KEY="MY_GEMINI_API_KEY"
        fi
        echo "GEMINI_API_KEY=$API_KEY" > .env
        echo "GEMINI_API_KEY=MY_GEMINI_API_KEY" > .env.example

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: TLE-Finder-VX.X
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
